services:
  mirofish:
    # Локально собранный образ (не тянем 14 ГБ из интернета)
    image: mirofish:local
    container_name: mirofish
    env_file:
      - .env
    ports:
      # Наружу нужен только бэкенд-API; фронтенд теперь в десктоп-приложении.
      # Заводской порт 18500 -> внутренний 5001
      - "18500:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads