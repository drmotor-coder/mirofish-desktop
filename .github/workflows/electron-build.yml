name: Electron Build & Release

on:
  push:
    tags:
      - 'v*'
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install root dependencies
      run: npm install

    - name: Build frontend
      run: |
        cd frontend
        npm install
        npm run build

    - name: Build & publish Electron app
      run: npm run electron-build-publish
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MiroFish-${{ github.ref_name }}
        path: |
          build/*.exe
          build/*.blockmap
          build/latest.yml
        retention-days: 30
        if-no-files-found: warn
